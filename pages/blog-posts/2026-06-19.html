    <script>
        (function () {
            const headPatBtn = document.getElementById("headPatBtn");
            const headPatCount = document.getElementById("headPatCount");
            const COUNTER_API = "https://site-counters.gzamlo98.workers.dev/api/counter?slug=2026-06-19";

            if (!headPatBtn || !headPatCount) return;

            async function loadCount() {
                try {
                    const res = await fetch(COUNTER_API, { method: "GET" });
                    if (!res.ok) throw new Error("failed to load counter");
                    const data = await res.json();
                    headPatCount.textContent = Number(data.count) || 0;
                } catch (err) {
                    console.error(err);
                }
            }

            headPatBtn.addEventListener("click", async function () {
                try {
                    const res = await fetch(COUNTER_API, { method: "POST" });
                    if (!res.ok) throw new Error("failed to increment counter");
                    const data = await res.json();
                    headPatCount.textContent = Number(data.count) || 0;
                } catch (err) {
                    console.error(err);
                }
            });

            loadCount();
        })();
    </script>
